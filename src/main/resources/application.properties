spring.application.name=reminder
spring.datasource.url=jdbc:postgresql://localhost:5432/chiclete
spring.datasource.username=chiclete
spring.datasource.password=chiclete
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${APP_JWT_SECRET:chiclete-reminder-super-secret-key-for-jwt-signing-minimum-32chars}
app.jwt.expiration-ms=86400000
